<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
<div class="container mt-2 ">
    <div class="row me-0 ">
        <div class="col-md-12=0 bg-light p-4 rounded shadow-sm "> <!-- controla o tamanho aqui -->
            <h1>Lista de Produtos</h1>
              <table class="table">
                <tr>
                  <th>Id</th>
                  <th>Nome</th>
                  <th>Descrição</th>
                  <th>Categoria</th>
                  <th>Valor</th>
                  <th>Quantidade</th>
                  <th>Imagem</th>
                  <th>Editar</th>
                  <th>Excluir</th>
                </tr>
                <tr th:each="produto :${produtos}">
                  <td th:text="${produto.id}" ></td>
                  <td th:text="${produto.nome}" ></td>
                  <td th:text="${produto.descricao}" ></td>
                  <td th:text="${produto.categoria != null ? produto.categoria.nome : 'Sem categoria'}"></td>
                  <td th:text="${produto.valor}" ></td>
                  <td th:text="${produto.quantidade}" ></td>
                  <td><img th:src="${produto.imagem}" style="width: 50px"></td>
                  <!--<td><button href="/produto/editar">Editar</button></td>
                  -->
                  <td>
                    <a type="button" th:href="@{/produto/editar/{id}(id=${produto.id})}"
                       class="btn btn-warning">Editar
                    </a>
                  </td>

                  <td>
                    <a type="button" th:href="@{/produto/deletar/{id}(id=${produto.id})}"
                       class="btn btn-danger">Deletar
                    </a>      </td>
                </tr>
              </table>
            <div class="row mt-4 align-items-center">
                <div class="col text-star">
                    <a type="button" th:href="@{/#}" class="btn btn-primary">Voltar para a tela de inicio </a>
                </div>
                <div class=" col text-center">
                    <a type="button" th:href="@{/produto/formulario}" class="btn btn-success">Novo Produto </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
