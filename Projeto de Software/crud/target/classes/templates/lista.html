<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista</title>
</head>
<body>
  <h1>Listas de Produtos</h1>
  <table border="1px">
    <tr>
      <th>Id</th>
      <th>Nome</th>
      <th>Descrição</th>
      <th>Valor</th>
      <th>Quantidade</th>
      <th>Imagem</th>
      <th>Editar</th>
      <th>Excluir</th>
    </tr>
    <tr th:each="produto :${produtos}">
      <td th:text="${produto.id}" ></td>
      <td th:text="${produto.nome}" ></td>
      <td th:text="${produto.descricao}" ></td>
      <td th:text="${produto.valor}" ></td>
      <td th:text="${produto.quantidade}" ></td>
      <td><img th:src="${produto.imagem}" style="width: 50px"></td>
      <td><button href="/produto/editar">Editar</button></td>
      <td><button href="/produto/excluir">Excluir</button></td>
    </tr>
  </table>

  <a href="/produto/formulario">Novo Item</a>
</body>
</html>
