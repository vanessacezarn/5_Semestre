<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body>
    <div class="container mt-4 mb-3">
        <div class="row justify-content-center">
            <!-- Esta div controla a largura do quadro cinza (col-md-8) -->
            <div class="col-md-6 bg-light p-3 rounded shadow-sm">
                <h1 class="text-center mt-0">Cadastro de Produto</h1>

                <form method="POST" th:action="@{/produto/salvar}" th:object="${produto}">
                    <input type="hidden" th:field="*{id}">

                    <div class="row mb-3 align-items-center">
                        <label for="nome" class="col-sm-2 col-form-label text-sm-end">Nome:</label>
                        <div class="col-sm-8">
                            <input type="text" id="nome" class="form-control" th:field="*{nome}">
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label for="descricao" class="col-sm-2 col-form-label text-sm-end">Descrição:</label>
                        <div class="col-sm-8">
                            <input type="text" id="descricao" class="form-control" th:field="*{descricao}">
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label for="valor" class="col-sm-2 col-form-label text-sm-end">Valor:</label>
                        <div class="col-sm-5">
                            <input type="number" id="valor" class="form-control" th:field="*{valor}">
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label for="quantidade" class="col-sm-2 col-form-label text-sm-end">Quantidade:</label>
                        <div class="col-sm-5">
                            <input type="number" id="quantidade" class="form-control" th:field="*{quantidade}">
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-2 col-form-label text-sm-end">Categoria:</label>
                        <div class="col-sm-5">
                            <select class="form-select" th:field="*{categoria}">
                                <option value="">Selecione categoria  </option>
                                <option th:each="cat : ${categorias}"
                                        th:value="${cat.id}"
                                        th:text="${cat.nome}">
                                </option>
                            </select>

                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label for="imagem" class="col-sm-2 col-form-label text-sm-end">Imagem:</label>
                        <div class="col-sm-8">
                            <input type="text" id="imagem" class="form-control" th:field="*{imagem}">
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col text-star">
                            <a type="button" th:href="@{/produto/listar}" class="btn btn-primary">Voltar</a>
                        </div>
                        <div class="col text-center">
                            <button type="reset" class="btn btn-secondary">Limpar</button>
                            <button type="submit" class="btn btn-success me-2">Cadastrar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
