<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista Categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
<div class="container mt-4 ">
    <div class="row me-0 ">
        <div class="col-md-8 bg-light p-3 rounded shadow-sm "> <!-- controla o tamanho aqui -->
            <h1>Lista de Categorias</h1>
            <table class="table">
                <tr>
                    <th>Id</th>
                    <th>Nome</th>
                    <th>Editar</th>
                    <th>Excluir</th>

                </tr>
                <tr th:each="categoria :${categoria}">
                    <td th:text="${categoria.id}" ></td>
                    <td th:text="${categoria.nome}" ></td>

                    <td>
                        <a type="button" th:href="@{/categoria/editar/{id}(id=${categoria.id})}"
                           class="btn btn-warning">Editar
                        </a>
                    </td>

                    <td>
                        <a type="button" th:href="@{/categoria/deletar/{id}(id=${categoria.id})}"
                           class="btn btn-danger">Deletar
                        </a>
                    </td>
                </tr>
            </table>
            <div class="row mt-4 align-items-center">
                <div class="col text-star">
                    <a type="button" th:href="@{/#}" class="btn btn-primary">Voltar para a tela de inicio </a>
                </div>
                <div class=" col text-center">
                    <a type="button" th:href="@{/categoria/formularioCategoria}" class="btn btn-success">Nova Categoria </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
